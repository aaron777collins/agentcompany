version: "3.9"

# AgentCompany — full-stack docker-compose
#
# Services are split across two networks:
#   internal  — service-to-service traffic; never exposed to the host
#   external  — Traefik attaches here so it can reach every service
#
# Plane is intentionally excluded because its own docker-compose ships
# ~15 services with tight coupling.  See docs/architecture/infrastructure.md
# for the recommended side-car integration pattern.

###############################################################################
# Networks
###############################################################################
networks:
  internal:
    driver: bridge
    internal: true       # no outbound internet from this network
  external:
    driver: bridge

###############################################################################
# Volumes
###############################################################################
volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
  mattermost_config:
  mattermost_data:
  mattermost_logs:
  mattermost_plugins:
  mattermost_client_plugins:
  traefik_certs:

###############################################################################
# Services
###############################################################################
services:

  # ---------------------------------------------------------------------------
  # Traefik — reverse proxy / API gateway
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.0
    container_name: agentcompany-traefik
    restart: unless-stopped
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_certs:/certs
    networks:
      - external
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=PathPrefix(`/traefik`)"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-strip"
      - "traefik.http.middlewares.traefik-strip.stripprefix.prefixes=/traefik"

  # ---------------------------------------------------------------------------
  # PostgreSQL — shared instance, one database per application
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: agentcompany-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentcompany}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: agentcompany_core
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentcompany} -d agentcompany_core"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Redis — caching and pub/sub (shared)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: agentcompany-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: agentcompany-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentcompany}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL:-http://localhost/minio-console}
    volumes:
      - minio_data:/data
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=agentcompany_external"
      # MinIO API
      - "traefik.http.routers.minio-api.rule=PathPrefix(`/minio/`)"
      - "traefik.http.routers.minio-api.service=minio-api-svc"
      - "traefik.http.services.minio-api-svc.loadbalancer.server.port=9000"
      - "traefik.http.routers.minio-api.middlewares=minio-strip"
      - "traefik.http.middlewares.minio-strip.stripprefix.prefixes=/minio"
      # MinIO console
      - "traefik.http.routers.minio-console.rule=PathPrefix(`/minio-console/`)"
      - "traefik.http.routers.minio-console.service=minio-console-svc"
      - "traefik.http.services.minio-console-svc.loadbalancer.server.port=9001"

  # MinIO bucket initialisation — runs once then exits
  minio-init:
    image: minio/mc:RELEASE.2024-01-16T16-07-38Z
    container_name: agentcompany-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentcompany}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
      OUTLINE_BUCKET: ${OUTLINE_S3_BUCKET:-outline}
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
        mc mb --ignore-existing local/$$OUTLINE_BUCKET &&
        mc anonymous set download local/$$OUTLINE_BUCKET &&
        echo 'MinIO buckets initialised'
      "
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # Keycloak — Identity / SSO
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: agentcompany-keycloak
    restart: unless-stopped
    command: start-dev  # switch to `start` + proper certs in production
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-agentcompany}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HOSTNAME_PATH: /auth
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY: edge
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD must be set}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /auth/health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=agentcompany_external"
      - "traefik.http.routers.keycloak.rule=PathPrefix(`/auth`)"
      - "traefik.http.routers.keycloak.service=keycloak-svc"
      - "traefik.http.services.keycloak-svc.loadbalancer.server.port=8080"

  # ---------------------------------------------------------------------------
  # Outline — Documentation wiki
  # ---------------------------------------------------------------------------
  outline:
    image: outlinewiki/outline:0.78.0
    container_name: agentcompany-outline
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgres://${POSTGRES_USER:-agentcompany}:${POSTGRES_PASSWORD}@postgres:5432/outline
      # Redis
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # App
      URL: ${OUTLINE_URL:-http://localhost/docs}
      PORT: "3000"
      SECRET_KEY: ${OUTLINE_SECRET_KEY:?OUTLINE_SECRET_KEY must be set}
      UTILS_SECRET: ${OUTLINE_UTILS_SECRET:?OUTLINE_UTILS_SECRET must be set}
      # File storage — MinIO as S3
      FILE_STORAGE: s3
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-agentcompany}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: us-east-1
      AWS_S3_UPLOAD_BUCKET_URL: http://minio:9000
      AWS_S3_UPLOAD_BUCKET_NAME: ${OUTLINE_S3_BUCKET:-outline}
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_S3_ACL: private
      # Auth — OIDC via Keycloak
      OIDC_CLIENT_ID: ${OUTLINE_OIDC_CLIENT_ID:-outline}
      OIDC_CLIENT_SECRET: ${OUTLINE_OIDC_CLIENT_SECRET:?OUTLINE_OIDC_CLIENT_SECRET must be set}
      OIDC_AUTH_URI: ${KEYCLOAK_HOSTNAME:-http://localhost}/auth/realms/${KEYCLOAK_REALM:-agentcompany}/protocol/openid-connect/auth
      OIDC_TOKEN_URI: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-agentcompany}/protocol/openid-connect/token
      OIDC_USERINFO_URI: http://keycloak:8080/auth/realms/${KEYCLOAK_REALM:-agentcompany}/protocol/openid-connect/userinfo
      OIDC_USERNAME_CLAIM: preferred_username
      OIDC_DISPLAY_NAME: "AgentCompany SSO"
      OIDC_SCOPES: "openid profile email"
      # Email (optional — set SMTP_* vars to enable)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@agentcompany.local}
      FORCE_HTTPS: "false"
      ENABLE_UPDATES: "false"
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/_health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=agentcompany_external"
      - "traefik.http.routers.outline.rule=PathPrefix(`/docs`)"
      - "traefik.http.routers.outline.service=outline-svc"
      - "traefik.http.services.outline-svc.loadbalancer.server.port=3000"

  # ---------------------------------------------------------------------------
  # Mattermost — Team chat
  # ---------------------------------------------------------------------------
  mattermost:
    image: mattermost/mattermost-team-edition:9.5
    container_name: agentcompany-mattermost
    restart: unless-stopped
    # Mattermost writes to /mattermost/{config,data,logs,plugins}
    # and requires the process to run as uid 2000
    user: "2000:2000"
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://${POSTGRES_USER:-agentcompany}:${POSTGRES_PASSWORD}@postgres:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_BLEVESETTINGS_INDEXDIR: /mattermost/bleve-indexes
      MM_SERVICESETTINGS_SITEURL: ${MATTERMOST_SITE_URL:-http://localhost/chat}
      MM_SERVICESETTINGS_LISTENADDRESS: ":8065"
      MM_PLUGINSETTINGS_ENABLEUPLOADS: "true"
      MM_CLUSTERSETTINGS_ENABLE: "false"
      MM_FILESETTINGS_DRIVERNAME: amazons3
      MM_FILESETTINGS_AMAZONS3BUCKET: mattermost
      MM_FILESETTINGS_AMAZONS3ACCESSKEYID: ${MINIO_ROOT_USER:-agentcompany}
      MM_FILESETTINGS_AMAZONS3SECRETACCESSKEY: ${MINIO_ROOT_PASSWORD}
      MM_FILESETTINGS_AMAZONS3ENDPOINT: minio:9000
      MM_FILESETTINGS_AMAZONS3SSL: "false"
      MM_FILESETTINGS_AMAZONS3PATHPREFIX: ""
    volumes:
      - mattermost_config:/mattermost/config
      - mattermost_data:/mattermost/data
      - mattermost_logs:/mattermost/logs
      - mattermost_plugins:/mattermost/plugins
      - mattermost_client_plugins:/mattermost/client/plugins
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8065/api/v4/system/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=agentcompany_external"
      - "traefik.http.routers.mattermost.rule=PathPrefix(`/chat`)"
      - "traefik.http.routers.mattermost.service=mattermost-svc"
      - "traefik.http.services.mattermost-svc.loadbalancer.server.port=8065"

  # ---------------------------------------------------------------------------
  # Meilisearch — Full-text search engine
  # ---------------------------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: agentcompany-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY:?MEILISEARCH_MASTER_KEY must be set}
      MEILI_ENV: ${MEILISEARCH_ENV:-development}
      MEILI_HTTP_ADDR: "0.0.0.0:7700"
      MEILI_LOG_LEVEL: INFO
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7700/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=agentcompany_external"
      - "traefik.http.routers.meilisearch.rule=PathPrefix(`/search`)"
      - "traefik.http.routers.meilisearch.service=meilisearch-svc"
      - "traefik.http.services.meilisearch-svc.loadbalancer.server.port=7700"
      - "traefik.http.routers.meilisearch.middlewares=meilisearch-strip"
      - "traefik.http.middlewares.meilisearch-strip.stripprefix.prefixes=/search"

  # ---------------------------------------------------------------------------
  # Agent Runtime — Custom FastAPI service (built from ./services/agent-runtime)
  # ---------------------------------------------------------------------------
  agent-runtime:
    build:
      context: ./services/agent-runtime
      dockerfile: Dockerfile
    image: agentcompany/agent-runtime:latest
    container_name: agentcompany-agent-runtime
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-agentcompany}:${POSTGRES_PASSWORD}@postgres:5432/agentcompany_core
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      KEYCLOAK_URL: http://keycloak:8080/auth
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-agentcompany}
      KEYCLOAK_CLIENT_ID: ${AGENT_RUNTIME_KEYCLOAK_CLIENT_ID:-agentcompany-api}
      KEYCLOAK_CLIENT_SECRET: ${AGENT_RUNTIME_KEYCLOAK_CLIENT_SECRET:-}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SECRET_KEY: ${AGENT_RUNTIME_SECRET_KEY:?AGENT_RUNTIME_SECRET_KEY must be set}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=agentcompany_external"
      - "traefik.http.routers.agent-runtime.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.agent-runtime.service=agent-runtime-svc"
      - "traefik.http.services.agent-runtime-svc.loadbalancer.server.port=8000"

  # ---------------------------------------------------------------------------
  # Web UI — Custom Next.js application (built from ./services/web-ui)
  # ---------------------------------------------------------------------------
  web-ui:
    build:
      context: ./services/web-ui
      dockerfile: Dockerfile
    image: agentcompany/web-ui:latest
    container_name: agentcompany-web-ui
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${WEB_UI_API_URL:-http://localhost/api}
      NEXT_PUBLIC_KEYCLOAK_URL: ${KEYCLOAK_HOSTNAME:-http://localhost}/auth
      NEXT_PUBLIC_KEYCLOAK_REALM: ${KEYCLOAK_REALM:-agentcompany}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${WEB_UI_KEYCLOAK_CLIENT_ID:-agentcompany-web}
      NODE_ENV: ${APP_ENV:-development}
    depends_on:
      agent-runtime:
        condition: service_healthy
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=agentcompany_external"
      - "traefik.http.routers.web-ui.rule=PathPrefix(`/app`) || Path(`/`)"
      - "traefik.http.routers.web-ui.service=web-ui-svc"
      - "traefik.http.services.web-ui-svc.loadbalancer.server.port=3000"

  # ---------------------------------------------------------------------------
  # Plane integration placeholder
  #
  # Plane ships its own docker-compose with ~15 tightly-coupled services.
  # The recommended integration approach is to run Plane via its own
  # docker-compose on the same Docker host, then attach the plane-proxy
  # container (below) to the external network so Traefik can route to it.
  #
  # Steps:
  #   1. Clone https://github.com/makeplane/plane and follow its setup guide
  #   2. In its docker-compose.yml change the web container network to include
  #      agentcompany_external (or use `docker network connect`)
  #   3. Remove the placeholder below and uncomment the real proxy block
  # ---------------------------------------------------------------------------
  plane-proxy:
    image: busybox:1.36
    container_name: agentcompany-plane-proxy
    restart: "no"
    command: >
      sh -c "echo 'Plane placeholder — see docker-compose.yml comments for integration instructions' && sleep infinity"
    networks:
      - external
    labels:
      - "traefik.enable=false"
