# Traefik dynamic configuration
#
# Traefik watches this file and reloads routes without a restart.
# Docker-label-based routes (defined in docker-compose.yml) are merged
# with these file-based routes automatically.
#
# This file is useful for:
#   - Routes to services that are NOT managed by docker-compose
#     (e.g. the Plane deployment running in its own compose stack)
#   - Shared middlewares referenced by multiple routers
#   - TLS options

http:

  ###########################################################################
  # Middlewares — reusable building blocks
  ###########################################################################
  middlewares:

    # Compress responses (gzip) for all text content types
    compress:
      compress: {}

    # Security headers applied to every response
    security-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"
          Server: ""   # hide server identity

    # Rate-limit middleware — protects public endpoints
    rate-limit:
      rateLimit:
        average: 100   # requests per second (sliding window)
        burst: 50

    # Strip /app prefix before forwarding to Next.js
    strip-app-prefix:
      stripPrefix:
        prefixes:
          - "/app"

    # Strip /api prefix before forwarding to agent-runtime
    strip-api-prefix:
      stripPrefix:
        prefixes:
          - "/api"

    # Strip /docs prefix before forwarding to Outline
    strip-docs-prefix:
      stripPrefix:
        prefixes:
          - "/docs"

    # Strip /chat prefix before forwarding to Mattermost
    strip-chat-prefix:
      stripPrefix:
        prefixes:
          - "/chat"

    # Strip /search prefix before forwarding to Meilisearch
    strip-search-prefix:
      stripPrefix:
        prefixes:
          - "/search"

  ###########################################################################
  # Routers and services for externally-managed deployments
  ###########################################################################
  routers:
    # No file-based routers needed for Plane — all Plane routing is handled
    # via Docker labels in docker-compose.plane.yml so Traefik picks them up
    # automatically when that compose file is active.
    #
    # Add file-based routers here only for services that live outside of
    # Docker Compose (e.g. external VMs or bare-metal services).

  services:
    # No file-based services needed — see routers comment above.

  ###########################################################################
  # Global middleware chains applied to all routers (optional)
  ###########################################################################
  # To apply security-headers + compress to every route, attach them
  # via entryPoint-level middleware chains in traefik.yml instead of
  # repeating them on every router.

tls:
  ###########################################################################
  # TLS options
  ###########################################################################
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305_SHA256
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
      sniStrict: false   # set to true when all clients send SNI
